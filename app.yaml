lang: cpp
config_name: hiroic_cpp
description: "hIRoic Convolution Reverb (C++)"
sources:
  - src/app.cpp
  - src/threads.cpp
  - src/wav_parser.cpp
  - src/ir_convert.cpp
  - src/audio_node.cpp
  - src/ui.cpp
  - src/ir_manager.cpp
  - src/commands.cpp
platform_sources:
  default:
    - src/dsp_stub.cpp
board_sources:
  stm32f746g-discovery:
    - src/dsp.cpp
includes:
  - include
defconfig:
  - CONFIG_OVE_BSP=y
  - CONFIG_OVE_AUDIO=y
  - CONFIG_OVE_FS=y
  - CONFIG_OVE_LVGL=y
  - CONFIG_OVE_QUEUE=y
  - CONFIG_OVE_TIMER=y
  - CONFIG_OVE_EVENTGROUP=y
  - CONFIG_OVE_SHELL=y
  - CONFIG_OVE_NVS=y
  - CONFIG_OVE_WATCHDOG=y
rtos_defconfig:
  freertos:
    - CONFIG_FREERTOS_TOTAL_HEAP_SIZE=65536
  zephyr:
    - CONFIG_ZEPHYR_HEAP_MEM_POOL_SIZE=32768
kconfig: |
  config DSP_BUFFER_SIZE
  	int "DSP buffer size (samples)"
  	default 512

  config DSP_BITSIZE
  	int "DSP bit depth"
  	default 32

  config DSP_RATE
  	int "Sample rate (Hz)"
  	default 44100

  config IR_MAX_LEN
  	int "Maximum IR length (samples)"
  	default 1048
